```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GLOBAL HISTORY MAP</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial, sans-serif;
    color:white;
}

canvas{
    display:block;
}

#title{
    position:absolute;
    top:18px;
    width:100%;
    text-align:center;
    font-size:72px;
    font-weight:700;
    letter-spacing:6px;
    z-index:10;
    text-shadow:
        0 0 12px rgba(255,255,255,.9),
        0 0 40px rgba(255,255,255,.6);
    pointer-events:none;
}

#subtitle{
    position:absolute;
    top:135px;
    width:100%;
    text-align:center;
    color:#66e0ff;
    letter-spacing:12px;
    font-size:16px;
    z-index:10;
    pointer-events:none;
}

.panel{
    position:absolute;
    top:90px;
    width:300px;
    background:rgba(0,0,0,.55);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    z-index:5;
}

#leftPanel{
    left:28px;
    padding:24px;
}

#rightPanel{
    right:28px;
    padding:18px;
}

.panel-title{
    font-size:14px;
    letter-spacing:4px;
    margin-bottom:30px;
    color:#e5e5e5;
}

.event{
    margin-bottom:30px;
    border-left:2px solid rgba(255,255,255,.12);
    padding-left:14px;
}

.event-year{
    font-size:13px;
    letter-spacing:4px;
    margin-bottom:10px;
}

.event-text{
    font-size:16px;
    line-height:1.7;
    color:#e8e8e8;
}

.event.survival{
    border-color:#00e5ff;
}

.event.global{
    border-color:#ffd000;
}

.event.modern{
    border-color:#00ff99;
}

.event.political{
    border-color:#ff5577;
}

select{
    width:100%;
    background:black;
    color:white;
    border:1px solid rgba(255,255,255,.25);
    padding:16px;
    margin-bottom:24px;
    font-size:16px;
}

#portrait{
    width:160px;
    height:160px;
    object-fit:cover;
    border-radius:24px;
    display:block;
    margin:10px auto 28px;
    box-shadow:
        0 0 20px rgba(255,255,255,.15);
}

#personName{
    font-size:40px;
    font-weight:700;
    line-height:1.05;

}

    color:#66d9ff;
    letter-spacing:8px;

}

    color:#d0d0d0;
    line-height:1.9;

    position:absolute;
    bottom:28px;
    left:50%;
    transform:translateX(-50%);
    width:68%;

    z-index:20;
}

#timeline-line{
    position:absolute;
    top:38px;
    width:100%;

    background:rgba(255,255,255,.15);
}

#life-line{
    position:absolute;
    top:37px;

    background:#00e5ff;
    box-shadow:
        0 0 12px #00e5ff,
        0 0 28px #00e5ff;
}

.year{
    position:absolute;
    top:0;
    transform:translateX(-50%);
    font-size:13px;
    letter-spacing:3px;
    color:#d8d8d8;
}

@media(max-width:900px){

    #title{
        font-size:42px;
    }

    #subtitle{
        top:90px;
        font-size:11px;
        letter-spacing:6px;
    }

    #leftPanel{
        display:none;
    }

    #rightPanel{
        width:220px;

        right:12px;

    #portrait{
        width:110px;
        height:110px;
    }

    #personName{
        font-size:28px;
    }

    #timeline{
        width:90%;
    }
}
</style>
</head>

<body>

<div id="title">GLOBAL HISTORY MAP</div>
<div id="subtitle">JOHN MANJIRO</div>

<div id="leftPanel" class="panel">
    <div class="panel-title">WORLD EVENTS</div>
    <div id="eventsContainer"></div>
</div>

<div id="rightPanel" class="panel">

    <select id="personSelect">
        <option value="manjiro">JOHN MANJIRO</option>
        <option value="tesla">NIKOLA TESLA</option>
    </select>

    <img id="portrait" src="john-manjiro-portrait.png">

    <div id="personName">JOHN<br>MANJIRO</div>

    <div id="lifespan">1827 — 1898</div>

    <div id="description">
        Nakahama Manjiro connected Japan and America during the dawn of globalization.
    </div>

</div>

<div id="timeline">

    <div id="timeline-line"></div>
    <div id="life-line"></div>

</div>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

const DATA = {

manjiro:{
    subtitle:"JOHN MANJIRO",
    portrait:"john-manjiro-portrait.png",
    name:"JOHN<br>MANJIRO",
    life:"1827 — 1898",
    color:"#00e5ff",

    description:
    "Nakahama Manjiro connected Japan and America during the dawn of globalization.",

    events:[
        {
            year:1839,
            text:"The First Opium War begins.",
            type:"political"
        },
        {
            year:1841,
            text:"Manjiro is shipwrecked on Torishima.",
            type:"survival"
        },
        {
            year:1848,
            text:"California Gold Rush accelerates migration.",
            type:"global"
        },
        {
            year:1853,
            text:"Commodore Perry arrives in Japan.",
            type:"political"
        },
        {
            year:1868,
            text:"Meiji Restoration transforms Japan.",
            type:"modern"
        }
    ],

    locations:[
        {name:"TOSASHIMIZU",lat:32.78,lng:132.95},
        {name:"TORISHIMA",lat:30.48,lng:140.30},
        {name:"HAWAII",lat:21.30,lng:-157.85},
        {name:"SAN FRANCISCO",lat:37.77,lng:-122.41}
    ],

    birth:1827,
    death:1898
},

tesla:{
    subtitle:"NIKOLA TESLA",
    portrait:"nikola-tesla-portrait.png",
    name:"NIKOLA<br>TESLA",
    life:"1856 — 1943",
    color:"#66d9ff",

    description:
    "Nikola Tesla pioneered alternating current systems and envisioned a globally connected electrical civilization.",

    events:[
        {
            year:1876,
            text:"Telephone technology rapidly expands.",
            type:"global"
        },
        {
            year:1882,
            text:"Tesla develops AC motor concepts.",
            type:"modern"
        },
        {
            year:1893,
            text:"Chicago World's Fair electrified.",
            type:"global"
        }
    ],

    locations:[
        {name:"SMILJAN",lat:44.56,lng:15.37},
        {name:"PARIS",lat:48.85,lng:2.35},
        {name:"NEW YORK",lat:40.71,lng:-74.00}
    ],

    birth:1856,
    death:1943
}

};

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.z = 9;

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.minDistance = 7;
controls.maxDistance = 12;

const ambient = new THREE.AmbientLight(0xffffff,1.2);
scene.add(ambient);

const loader = new THREE.TextureLoader();

const earthTexture = loader.load('earth.jpg');

const earth = new THREE.Mesh(
    new THREE.SphereGeometry(3,64,64),
    new THREE.MeshPhongMaterial({
        map:earthTexture
    })
);

scene.add(earth);

const glow = new THREE.Mesh(
    new THREE.SphereGeometry(3.08,64,64),
    new THREE.MeshBasicMaterial({
        color:0x00d9ff,
        transparent:true,
        opacity:.15
    })
);

scene.add(glow);

const stars = new THREE.Group();

for(let i=0;i<1200;i++){

    const star = new THREE.Mesh(
        new THREE.SphereGeometry(.01,6,6),
        new THREE.MeshBasicMaterial({color:0xffffff})
    );

    star.position.set(
        (Math.random()-.5)*120,
        (Math.random()-.5)*120,
        (Math.random()-.5)*120
    );

    stars.add(star);
}

scene.add(stars);

let labels = [];
let lines = [];

function latLngToVector3(lat,lng,r=3){

    const phi = (90-lat)*(Math.PI/180);
    const theta = (lng+180)*(Math.PI/180);

    return new THREE.Vector3(
        -(r*Math.sin(phi)*Math.cos(theta)),
        r*Math.cos(phi),
        r*Math.sin(phi)*Math.sin(theta)
    );
}

function clearObjects(){

    labels.forEach(l=>document.body.removeChild(l));
    labels=[];

    lines.forEach(l=>scene.remove(l));
    lines=[];
}

function createCurve(start,end,color){

    const mid = start.clone().add(end).multiplyScalar(.5);

    mid.normalize().multiplyScalar(5.8);

    const curve = new THREE.QuadraticBezierCurve3(
        start,
        mid,
        end
    );

    const points = curve.getPoints(120);

    const geometry = new THREE.BufferGeometry().setFromPoints(points);

    const material = new THREE.LineBasicMaterial({
        color:color
    });

    const line = new THREE.Line(geometry,material);

    scene.add(line);

    lines.push(line);
}

function loadPerson(id){

    clearObjects();

    const p = DATA[id];

    document.getElementById('subtitle').innerHTML = p.subtitle;
    document.getElementById('portrait').src = p.portrait;
    document.getElementById('personName').innerHTML = p.name;
    document.getElementById('lifespan').innerHTML = p.life;
    document.getElementById('description').innerHTML = p.description;

    const eventsContainer =
        document.getElementById('eventsContainer');

    eventsContainer.innerHTML = '';

    p.events.forEach(ev=>{

        const div = document.createElement('div');

        div.className = `event ${ev.type}`;

        div.innerHTML = `
            <div class="event-year">${ev.year}</div>
            <div class="event-text">${ev.text}</div>
        `;

        eventsContainer.appendChild(div);
    });

    const start = 1500;
    const end = 2000;

    const left =
        ((p.birth-start)/(end-start))*100;

    const width =
        ((p.death-p.birth)/(end-start))*100;

    const lifeLine = document.getElementById('life-line');

    lifeLine.style.left = left + '%';
    lifeLine.style.width = width + '%';
    lifeLine.style.background = p.color;

    p.locations.forEach((loc,index)=>{

        const pos = latLngToVector3(loc.lat,loc.lng);

        const marker = new THREE.Mesh(
            new THREE.SphereGeometry(.08,16,16),
            new THREE.MeshBasicMaterial({
                color:p.color
            })
        );

        marker.position.copy(pos);

        scene.add(marker);

        lines.push(marker);

        if(index<p.locations.length-1){

            const next = p.locations[index+1];

            createCurve(
                pos,
                latLngToVector3(next.lat,next.lng),
                p.color
            );
        }

        const label = document.createElement('div');

        label.innerHTML = loc.name;

        label.style.position='absolute';
        label.style.color='white';
        label.style.fontSize='16px';
        label.style.letterSpacing='3px';
        label.style.pointerEvents='none';
        label.style.textShadow='0 0 12px white';

        document.body.appendChild(label);

        labels.push(label);

        label.userData = {
            position:pos
        };
    });
}

for(let y=1500;y<=2000;y+=100){

    const div = document.createElement('div');

    div.className='year';

    div.innerHTML=y;

    div.style.left=
        ((y-1500)/500)*100+'%';

    document.getElementById('timeline')
        .appendChild(div);
}

document
.getElementById('personSelect')
.addEventListener('change',e=>{

    loadPerson(e.target.value);
});

loadPerson('manjiro');

function animate(){

    requestAnimationFrame(animate);

    controls.update();

    labels.forEach(label=>{

        const pos =
            label.userData.position.clone();

        pos.project(camera);

        const x =
            (pos.x*.5+.5)*window.innerWidth;

        const y =
            (-pos.y*.5+.5)*window.innerHeight;

        label.style.left = `${x}px`;
        label.style.top = `${y}px`;

        const camDir =
            camera.position.clone().normalize();

        const dot =
            label.userData.position.clone()
            .normalize()
            .dot(camDir);

        label.style.display =
            dot > .2 ? 'block':'none';
    });

    renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{

    camera.aspect=
        window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});

</script>

</body>
</html>
