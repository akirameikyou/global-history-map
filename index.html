<!DOCTYPE html>
<html lang="en">


<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOBAL HISTORY MAP</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
}

canvas{
display:block;
}

.title{
position:absolute;
top:30px;
width:100%;
text-align:center;
color:white;
z-index:10;
pointer-events:none;
}

.title h1{
margin:0;
font-size:42px;
letter-spacing:6px;
text-shadow:0 0 20px rgba(255,255,255,0.8);
}

.title p{
margin-top:10px;
font-size:12px;
letter-spacing:10px;
color:#aaa;
}

.info{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
color:#888;
font-size:12px;
letter-spacing:3px;
z-index:10;
pointer-events:none;
}

</style>
</head>

<body>

<div class="title">
<h1>GLOBAL HISTORY MAP</h1>
<p>HUMANITY THROUGH TIME</p>
</div>

<div class="info">
DRAG TO ROTATE • SCROLL TO ZOOM
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

import { OrbitControls }
from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping = true;

const starsGeometry = new THREE.BufferGeometry();

const starsCount = 10000;

const starsPositions = [];

for(let i=0;i<starsCount;i++){

const x = (Math.random()-0.5)*2000;
const y = (Math.random()-0.5)*2000;
const z = (Math.random()-0.5)*2000;

starsPositions.push(x,y,z);

}

starsGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(starsPositions,3)
);

const starsMaterial = new THREE.PointsMaterial({
color:0xffffff,
size:0.7
});

const starField = new THREE.Points(
starsGeometry,
starsMaterial
);

scene.add(starField);

const textureLoader = new THREE.TextureLoader();

const geometry = new THREE.SphereGeometry(
2,
64,
64
);

const material = new THREE.MeshStandardMaterial({
color:0x2266ff,
metalness:0.3,
roughness:0.6
});

const earth = new THREE.Mesh(
geometry,
material
);

scene.add(earth);

const glowGeometry = new THREE.SphereGeometry(
2.15,
64,
64
);

const glowMaterial = new THREE.MeshBasicMaterial({
color:0x3399ff,
transparent:true,
opacity:0.15
});

const glow = new THREE.Mesh(
glowGeometry,
glowMaterial
);

scene.add(glow);

const sunLight = new THREE.PointLight(
0xffffff,
7
);

sunLight.position.set(5,3,5);

scene.add(sunLight);

const ambientLight = new THREE.AmbientLight(
0xffffff,
2
);

scene.add(ambientLight);

function createNode(lat,lon,color=0xffaa00){

const nodeGeometry =
new THREE.SphereGeometry(0.03,16,16);

const nodeMaterial =
new THREE.MeshBasicMaterial({
color:color
});

const node =
new THREE.Mesh(nodeGeometry,nodeMaterial);

const phi =
(90-lat)*(Math.PI/180);

const theta =
(lon+180)*(Math.PI/180);

const radius = 2.02;

node.position.x =
-(radius*Math.sin(phi)*Math.cos(theta));

node.position.y =
radius*Math.cos(phi);

node.position.z =
radius*Math.sin(phi)*Math.sin(theta);

scene.add(node);

}

createNode(35.6762,139.6503,0x00ffff);
createNode(41.9028,12.4964,0xffaa00);
createNode(30.0444,31.2357,0xff0000);
createNode(39.9042,116.4074,0x00ff66);

function animate(){

requestAnimationFrame(animate);

earth.rotation.y += 0.0015;

glow.rotation.y += 0.0015;

controls.update();

renderer.render(scene,camera);

}

animate();

window.addEventListener('resize',()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
