<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GLOBAL HISTORY MAP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
color:white;
}

/* ===== TITLE ===== */

.title{
position:absolute;
top:20px;
width:100%;
text-align:center;
z-index:20;
pointer-events:none;
}

.title h1{
font-size:92px;
letter-spacing:10px;
font-weight:700;
color:white;
text-shadow:
0 0 10px rgba(255,255,255,0.9),
0 0 30px rgba(255,255,255,0.7),
0 0 60px rgba(255,255,255,0.5);
}

.subtitle{
margin-top:10px;
font-size:16px;
letter-spacing:12px;
color:#66e0ff;
}

/* ===== LEFT PANEL ===== */

.leftPanel{
position:absolute;
left:30px;
top:90px;
width:340px;
height:720px;
padding:24px;
background:rgba(0,0,0,0.55);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
overflow-y:auto;
z-index:10;
}

.leftPanel h2{
font-size:16px;
letter-spacing:4px;
margin-bottom:30px;
color:#dddddd;
}

.event{
margin-bottom:26px;
padding-bottom:18px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.eventYear{
font-size:13px;
letter-spacing:4px;
color:#bbbbbb;
margin-bottom:10px;
}

.eventText{
font-size:14px;
line-height:1.8;
color:#dddddd;
}

/* ===== RIGHT PANEL ===== */

.rightPanel{
position:absolute;
right:30px;
top:90px;
width:390px;
height:760px;
padding:26px;
background:rgba(0,0,0,0.58);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
overflow-y:auto;
z-index:10;
}

select{
width:100%;
padding:16px;
background:black;
color:white;
border:1px solid rgba(255,255,255,0.15);
font-size:16px;
margin-bottom:30px;
}

.portrait{
width:170px;
height:170px;
border-radius:24px;
overflow:hidden;
margin:0 auto 30px auto;
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 0 25px rgba(255,255,255,0.12);
background:#111;
}

.portrait img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.personName{
font-size:58px;
font-weight:700;
line-height:0.95;
margin-bottom:18px;
}

.life{
font-size:16px;
letter-spacing:6px;
color:#88dfff;
margin-bottom:30px;
}

.description{
font-size:15px;
line-height:2.0;
color:#dddddd;
}

/* ===== TIMELINE ===== */

.timeline{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:35px;
width:1250px;
z-index:20;
}

.timelineLine{
height:3px;
background:rgba(255,255,255,0.12);
position:relative;
}

.lifeBar{
position:absolute;
height:3px;
top:0;
background:#00e5ff;
box-shadow:0 0 14px #00e5ff;
}

.timelineYears{
display:flex;
justify-content:space-between;
margin-bottom:14px;
font-size:14px;
letter-spacing:4px;
color:#cccccc;
}

.label{
position:absolute;
font-size:15px;
letter-spacing:3px;
color:white;
pointer-events:none;
text-shadow:0 0 14px rgba(255,255,255,0.8);
white-space:nowrap;
}

canvas{
display:block;
}

</style>
</head>
<body>

<div class="title">
<h1>GLOBAL HISTORY MAP</h1>
<div class="subtitle" id="subtitle">JOHN MANJIRO</div>
</div>

<div class="leftPanel">
<h2>WORLD EVENTS</h2>

<div id="events"></div>
</div>

<div class="rightPanel">

<select id="personSelect">
<option value="manjiro">JOHN MANJIRO</option>
<option value="tesla">NIKOLA TESLA</option>
</select>

<div class="portrait">
<img id="portrait"
src="john-manjiro-portrait.png"
onerror="this.src='https://dummyimage.com/400x400/111/666.png&text=NO+IMAGE';">
</div>

<div class="personName" id="personName">
JOHN<br>MANJIRO
</div>

<div class="life" id="life">
1827 — 1898
</div>

<div class="description" id="description">
Nakahama Manjiro connected Japan and America during the dawn of globalization.
</div>

</div>

<div class="timeline">

<div class="timelineYears">
<span>1500</span>
<span>1600</span>
<span>1700</span>
<span>1800</span>
<span>1900</span>
<span>2000</span>
</div>

<div class="timelineLine">
<div class="lifeBar" id="lifeBar"></div>
</div>

</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

/* =========================
DATA
========================= */

const people = {

manjiro:{
name:"JOHN MANJIRO",
subtitle:"JOHN MANJIRO",
life:"1827 — 1898",
birth:1827,
death:1898,
image:"john-manjiro-portrait.png",
description:
"Nakahama Manjiro connected Japan and America during the dawn of globalization.",

events:[
["1839","The First Opium War begins."],
["1848","California Gold Rush accelerates migration."],
["1853","Commodore Perry arrives in Japan."],
["1868","Meiji Restoration transforms Japan."]
],

locations:[
{name:"TOSASHIMIZU",lat:32.78,lon:132.95},
{name:"TORISHIMA",lat:30.48,lon:140.31},
{name:"HAWAII",lat:21.30,lon:-157.85},
{name:"SAN FRANCISCO",lat:37.77,lon:-122.41}
]
},

tesla:{
name:"NIKOLA TESLA",
subtitle:"NIKOLA TESLA",
life:"1856 — 1943",
birth:1856,
death:1943,
image:"nikola-tesla-portrait.png",
description:
"Nikola Tesla pioneered alternating current systems and envisioned a globally connected electrical civilization.",

events:[
["1876","Telephone technology rapidly expands."],
["1882","Tesla develops AC motor concepts."],
["1893","Chicago World's Fair electrified."],
["1901","Wardenclyffe Tower construction begins."]
],

locations:[
{name:"SMILJAN",lat:44.56,lon:15.37},
{name:"PARIS",lat:48.85,lon:2.35},
{name:"NEW YORK",lat:40.71,lon:-74.00},
{name:"COLORADO",lat:38.83,lon:-104.82}
]
}

};

/* =========================
THREE
========================= */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
2000
);

camera.position.z = 12;

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);

/* ===== STARS ===== */

const starsGeometry = new THREE.BufferGeometry();

const starVertices = [];

for(let i=0;i<12000;i++){

starVertices.push(
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000
);

}

starsGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
);

const starsMaterial = new THREE.PointsMaterial({
color:0xffffff,
size:0.7
});

const stars = new THREE.Points(
starsGeometry,
starsMaterial
);

scene.add(stars);

/* ===== EARTH ===== */

const group = new THREE.Group();

scene.add(group);

const textureLoader = new THREE.TextureLoader();

const earthTexture = textureLoader.load(
'earth.jpg',
undefined,
undefined,
()=>{console.log("earth texture failed")}
);

const earth = new THREE.Mesh(
new THREE.SphereGeometry(4,64,64),
new THREE.MeshStandardMaterial({
map:earthTexture
})
);

group.add(earth);

/* ===== GLOW ===== */

const glow = new THREE.Mesh(
new THREE.SphereGeometry(4.12,64,64),
new THREE.MeshBasicMaterial({
color:0x00dfff,
transparent:true,
opacity:0.12
})
);

group.add(glow);

/* ===== LIGHT ===== */

const light = new THREE.PointLight(0xffffff,5);

light.position.set(10,10,10);

scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,2));

/* =========================
LABELS
========================= */

const labels = [];
let routes = [];

function latLonToVector3(lat,lon,radius){

const phi = (90-lat)*(Math.PI/180);
const theta = (lon+180)*(Math.PI/180);

return new THREE.Vector3(
-(radius*Math.sin(phi)*Math.cos(theta)),
radius*Math.cos(phi),
radius*Math.sin(phi)*Math.sin(theta)
);

}

function clearRoutes(){

routes.forEach(r=>group.remove(r));

routes=[];

labels.forEach(l=>l.remove());

labels.length=0;

}

function createRoutes(person){

clearRoutes();

const locations = person.locations;

locations.forEach(loc=>{

const point = latLonToVector3(
loc.lat,
loc.lon,
4.03
);

const dot = new THREE.Mesh(
new THREE.SphereGeometry(0.08,16,16),
new THREE.MeshBasicMaterial({color:0x00e5ff})
);

dot.position.copy(point);

group.add(dot);

const label = document.createElement('div');

label.className='label';
label.innerHTML=loc.name;

document.body.appendChild(label);

labels.push(label);

loc.vector = point;
loc.dot = dot;
loc.label = label;

});

for(let i=0;i<locations.length-1;i++){

const start = locations[i].vector;
const end = locations[i+1].vector;

const mid = start.clone().add(end).multiplyScalar(0.5);

mid.normalize().multiplyScalar(5.2);

const curve = new THREE.QuadraticBezierCurve3(
start,
mid,
end
);

const points = curve.getPoints(120);

const geometry = new THREE.BufferGeometry().setFromPoints(points);

const material = new THREE.LineBasicMaterial({
color:0x00e5ff
});

const line = new THREE.Line(geometry,material);

group.add(line);

routes.push(line);

}

}

/* =========================
UI
========================= */

function updateUI(key){

const person = people[key];

document.getElementById('subtitle').innerText =
person.subtitle;

document.getElementById('personName').innerHTML =
person.name.replace(" ","<br>");

document.getElementById('life').innerText =
person.life;

document.getElementById('description').innerText =
person.description;

document.getElementById('portrait').src =
person.image;

const eventsDiv = document.getElementById('events');

eventsDiv.innerHTML='';

person.events.forEach(e=>{

eventsDiv.innerHTML += `
<div class="event">
<div class="eventYear">${e[0]}</div>
<div class="eventText">${e[1]}</div>
</div>
`;

});

const totalStart = 1500;
const totalEnd = 2000;
const total = totalEnd-totalStart;

const left =
((person.birth-totalStart)/total)*100;

const width =
((person.death-person.birth)/total)*100;

const lifeBar = document.getElementById('lifeBar');

lifeBar.style.left = left + '%';
lifeBar.style.width = width + '%';

createRoutes(person);

}

/* =========================
ROTATION
========================= */

let isDragging = false;
let previousMouseX = 0;

window.addEventListener('mousedown',(e)=>{

isDragging = true;
previousMouseX = e.clientX;

});

window.addEventListener('mouseup',()=>{

isDragging = false;

});

window.addEventListener('mousemove',(e)=>{

if(isDragging){

const delta = e.clientX - previousMouseX;

group.rotation.y += delta * 0.005;

previousMouseX = e.clientX;

}

});

/* =========================
LABEL UPDATE
========================= */

function updateLabels(){

labels.forEach(label=>{

const vector = label.__vector;

});

const person =
people[document.getElementById('personSelect').value];

person.locations.forEach(loc=>{

const pos = loc.vector.clone();

pos.applyMatrix4(group.matrixWorld);

const projected = pos.clone().project(camera);

const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;

loc.label.style.left = `${x}px`;
loc.label.style.top = `${y}px`;

const cameraDirection = camera.position.clone().normalize();
const dotDirection = pos.clone().normalize();

const visible =
cameraDirection.dot(dotDirection) > 0.25;

loc.label.style.display =
visible ? 'block' : 'none';

});

}

/* =========================
SELECT
========================= */

document.getElementById('personSelect')
.addEventListener('change',(e)=>{

updateUI(e.target.value);

});

/* =========================
START
========================= */

updateUI('manjiro');

/* =========================
ANIMATE
========================= */

function animate(){

requestAnimationFrame(animate);

group.rotation.y += 0.001;

updateLabels();

renderer.render(scene,camera);

}

animate();

/* =========================
RESIZE
========================= */

window.addEventListener('resize',()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
