<!-- three.js / globe.gl -->
<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script>

/* =========================
   EVENTS
========================= */

const events = [

{
  year:1839,
  title:"1839 — First Opium War",
  text:"Britain and Qing China entered into conflict over trade and imperial influence in East Asia.",
  lat:31,
  lng:121
},

{
  year:1841,
  title:"1841 — Torishima",
  text:"John Manjiro was shipwrecked and drifted to Torishima.",
  lat:30.48,
  lng:140.30
},

{
  year:1843,
  title:"1843 — Hawaii",
  text:"Manjiro crossed the Pacific and experienced international culture.",
  lat:21.30,
  lng:-157.85
},

{
  year:1848,
  title:"1848 — California Gold Rush",
  text:"Pacific migration accelerated between America and Asia.",
  lat:37.77,
  lng:-122.41
},

{
  year:1853,
  title:"1853 — Perry Arrives",
  text:"The Black Ships pressured Japan to open internationally.",
  lat:35.68,
  lng:139.69
},

{
  year:1868,
  title:"1868 — Meiji Restoration",
  text:"Japan entered rapid modernization.",
  lat:35.68,
  lng:139.69
}

];

/* =========================
   GLOBE
========================= */

const world = Globe()
(document.getElementById('globeViz'))

.globeImageUrl(
'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'
)

.bumpImageUrl(
'https://unpkg.com/three-globe/example/img/earth-topology.png'
)

.backgroundColor('rgba(0,0,0,0)')

.atmosphereColor('#46dfff')

.atmosphereAltitude(0.14);

/* =========================
   初期視点
========================= */

world.pointOfView({
  lat:30,
  lng:140,
  altitude:2.1
});

/* =========================
   自動回転
========================= */

world.controls().autoRotate = true;
world.controls().autoRotateSpeed = 0.45;

/* =========================
   都市光
========================= */

world
.pointsData([

{
  lat:35.68,
  lng:139.69,
  size:.18,
  color:"#46dfff"
},

{
  lat:30.48,
  lng:140.30,
  size:.14,
  color:"#ffffff"
},

{
  lat:21.30,
  lng:-157.85,
  size:.18,
  color:"#46dfff"
},

{
  lat:37.77,
  lng:-122.41,
  size:.22,
  color:"#ffd95e"
},

{
  lat:31,
  lng:121,
  size:.15,
  color:"#ff6464"
}

])

.pointAltitude(.01)

.pointRadius('size')

.pointColor('color');

/* =========================
   航路ライン
========================= */

world.arcsData([

{
  startLat:30.48,
  startLng:140.30,
  endLat:21.30,
  endLng:-157.85,
  color:["#46dfff","#46dfff"]
},

{
  startLat:21.30,
  startLng:-157.85,
  endLat:37.77,
  endLng:-122.41,
  color:["#ffd95e","#46dfff"]
},

{
  startLat:37.77,
  startLng:-122.41,
  endLat:35.68,
  endLng:139.69,
  color:["#ffffff","#46dfff"]
}

])

.arcStroke(.7)

.arcDashLength(.35)

.arcDashGap(.9)

.arcDashAnimateTime(3500);

/* =========================
   POPUP
========================= */

let popupOpen = false;

function showEvent(index){

  const e = events[index];

  document.getElementById('cardTitle')
  .innerHTML = e.title;

  document.getElementById('cardText')
  .innerHTML = e.text;

  document.getElementById('infoCard')
  .classList.add('active');

  popupOpen = true;

  world.controls().autoRotate = false;

  world.pointOfView({

    lat:e.lat,
    lng:e.lng,
    altitude:1.5

  },1400);

}

/* =========================
   CLOSE
========================= */

function closeCard(){

  document.getElementById('infoCard')
  .classList.remove('active');

  popupOpen = false;

  world.controls().autoRotate = true;

}

/* =========================
   TIMELINE
========================= */

const startYear = 1600;
const endYear = 2000;

document.querySelectorAll('.timeline-point')
.forEach((el,index)=>{

  const year = events[index].year;

  const pos =
    ((year - startYear) /
    (endYear - startYear)) * 100;

  el.style.left = pos + '%';

});

/* =========================
   ACTIVE POINT
========================= */

function activatePoint(index){

  document
  .querySelectorAll('.timeline-point')
  .forEach(p=>p.classList.remove('active'));

  document
  .querySelectorAll('.timeline-point')[index]
  .classList.add('active');

}

</script>
