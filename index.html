<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GLOBAL HISTORY MAP</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
color:white;
}

canvas{
display:block;
}

/* =========================
TITLE
========================= */

.title{
position:absolute;
top:30px;
width:100%;
text-align:center;
z-index:20;
pointer-events:none;
}

.title h1{
margin:0;
font-size:44px;
letter-spacing:8px;
text-shadow:0 0 25px rgba(255,255,255,0.95);
}

.title p{
margin-top:10px;
font-size:13px;
letter-spacing:10px;
color:#7fe7ff;
}

/* =========================
PANEL
========================= */

.panel{
position:absolute;
right:30px;
top:110px;
width:340px;

background:rgba(0,0,0,0.72);

border:1px solid rgba(255,255,255,0.12);

padding:20px;

z-index:30;

backdrop-filter:blur(10px);

box-shadow:
0 0 40px rgba(0,150,255,0.2);
}

.panel img{
width:100%;
border-radius:14px;
margin-bottom:15px;
display:block;
}

.panel h2{
margin:0;
font-size:24px;
letter-spacing:2px;
}

.life{
margin-top:8px;
margin-bottom:18px;

font-size:12px;
letter-spacing:4px;

color:#7fe7ff;
opacity:0.85;
}

.panel p{
font-size:13px;
line-height:1.8;
color:#ccc;
}

select{
width:100%;
margin-bottom:20px;

background:black;
color:white;

border:1px solid rgba(255,255,255,0.2);

padding:12px;
}

/* =========================
TAGS
========================= */

.tags{
margin-top:20px;

display:flex;
flex-wrap:wrap;

gap:8px;
}

.tag{
padding:6px 10px;

font-size:11px;
letter-spacing:1px;

border:
1px solid rgba(0,200,255,0.4);

color:#7fe7ff;

background:
rgba(0,120,255,0.08);
}

/* =========================
TIMELINE
========================= */

.timeline{
position:absolute;

bottom:30px;
left:50%;

transform:translateX(-50%);

display:flex;
align-items:center;

gap:12px;

z-index:20;

font-size:12px;
letter-spacing:3px;
}

.line{
width:80px;
height:1px;

background:
rgba(255,255,255,0.35);
}

/* =========================
LABELS
========================= */

.label{
position:absolute;

font-size:12px;
letter-spacing:2px;

color:white;

text-shadow:
0 0 14px rgba(255,255,255,1);

pointer-events:none;

z-index:25;

white-space:nowrap;

transition:opacity 0.3s;
}

</style>
</head>

<body>

<!-- =========================
TITLE
========================= -->

<div class="title">

<h1>GLOBAL HISTORY MAP</h1>

<p id="subtitle">
JOHN MANJIRO
</p>

</div>

<!-- =========================
PANEL
========================= -->

<div class="panel">

<select id="characterSelect">

<option value="manjiro">
JOHN MANJIRO
</option>

<option value="tesla">
NIKOLA TESLA
</option>

</select>

<img
id="portrait"
src="john-manjiro-portrait.png"
>

<h2 id="characterName">
JOHN MANJIRO
</h2>

<div class="life" id="lifeDates">
1827 — 1898
</div>

<p id="description">
Nakahama Manjiro connected Japan and America during the dawn of globalization.
</p>

<div
class="tags"
id="tags">
</div>

</div>

<!-- =========================
TIMELINE
========================= -->

<div class="timeline">

<div>1800</div>

<div class="line"></div>

<div>1850</div>

<div class="line"></div>

<div>1900</div>

<div class="line"></div>

<div>1950</div>

</div>

<script type="module">

import * as THREE from
'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

/* =========================
SCENE
========================= */

const scene = new THREE.Scene();

/* =========================
CAMERA
========================= */

const camera =
new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 5;

/* =========================
RENDERER
========================= */

const renderer =
new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.setPixelRatio(
window.devicePixelRatio
);

document.body.appendChild(
renderer.domElement);

/* =========================
STARS
========================= */

const starsGeometry =
new THREE.BufferGeometry();

const starVertices = [];

for(let i=0;i<15000;i++){

const x =
(Math.random()-0.5)*2500;

const y =
(Math.random()-0.5)*2500;

const z =
(Math.random()-0.5)*2500;

starVertices.push(x,y,z);

}

starsGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(
starVertices,
3
)
);

const starsMaterial =
new THREE.PointsMaterial({
color:0xffffff,
size:0.7
});

const stars =
new THREE.Points(
starsGeometry,
starsMaterial
);

scene.add(stars);

/* =========================
EARTH
========================= */

const textureLoader =
new THREE.TextureLoader();

const earthTexture =
textureLoader.load('earth.jpg');

const earthGroup =
new THREE.Group();

scene.add(earthGroup);

const earthGeometry =
new THREE.SphereGeometry(
2,
64,
64
);

const earthMaterial =
new THREE.MeshStandardMaterial({
map:earthTexture,
metalness:0.08,
roughness:0.78
});

const earth =
new THREE.Mesh(
earthGeometry,
earthMaterial
);

earthGroup.add(earth);

/* =========================
GLOW
========================= */

const glowGeometry =
new THREE.SphereGeometry(
2.15,
64,
64
);

const glowMaterial =
new THREE.MeshBasicMaterial({
color:0x33bbff,
transparent:true,
opacity:0.15
});

const glow =
new THREE.Mesh(
glowGeometry,
glowMaterial
);

earthGroup.add(glow);

/* =========================
LIGHTS
========================= */

const light =
new THREE.PointLight(
0xffffff,
8
);

light.position.set(5,3,5);

scene.add(light);

const ambientLight =
new THREE.AmbientLight(
0xffffff,
2
);

scene.add(ambientLight);

/* =========================
CHARACTER DATA
========================= */

const characters = {

manjiro:{

name:'JOHN MANJIRO',

life:'1827 — 1898',

portrait:
'john-manjiro-portrait.png',

description:
'Nakahama Manjiro connected Japan and America during the dawn of globalization.',

tags:[
'PACIFIC',
'NAVIGATION',
'GLOBALIZATION',
'MODERNIZATION'
],

color:0x00ffff,

locations:[

{
name:'TOSASHIMIZU',
lat:32.78,
lon:132.95
},

{
name:'TORISHIMA',
lat:30.48,
lon:140.30
},

{
name:'HAWAII',
lat:21.30,
lon:202.15
},

{
name:'NEW BEDFORD',
lat:41.63,
lon:289.07
},

{
name:'SAN FRANCISCO',
lat:37.77,
lon:237.59
}

]

},

tesla:{

name:'NIKOLA TESLA',

life:'1856 — 1943',

portrait:
'nikola-tesla-portrait.png',

description:
'Tesla transformed modern civilization through electricity, wireless communication, and visionary engineering.',

tags:[
'ELECTRICITY',
'WIRELESS',
'ENERGY',
'SCIENCE'
],

color:0xcc88ff,

locations:[

{
name:'SMILJAN',
lat:44.56,
lon:15.37
},

{
name:'GRAZ',
lat:47.07,
lon:15.43
},

{
name:'PARIS',
lat:48.85,
lon:2.35
},

{
name:'NEW YORK',
lat:40.71,
lon:-74.00
},

{
name:'COLORADO',
lat:38.83,
lon:-104.82
}

]

}

};

/* =========================
HTML REFERENCES
========================= */

const subtitle =
document.getElementById('subtitle');

const portrait =
document.getElementById('portrait');

const characterName =
document.getElementById('characterName');

const lifeDates =
document.getElementById('lifeDates');

const description =
document.getElementById('description');

const tagsContainer =
document.getElementById('tags');

/* =========================
HELPERS
========================= */

function latLonToVector3(lat,lon,radius){

const phi =
(90-lat)*(Math.PI/180);

const theta =
(lon)*(Math.PI/180);

const x =
radius*Math.sin(phi)*Math.cos(theta);

const y =
radius*Math.cos(phi);

const z =
radius*Math.sin(phi)*Math.sin(theta);

return new THREE.Vector3(x,y,z);

}

/* =========================
STORAGE
========================= */

let nodes = [];
let labels = [];
let routeMeshes = [];

/* =========================
CLEAR
========================= */

function clearScene(){

nodes.forEach(node=>{
earthGroup.remove(node);
});

nodes = [];

labels.forEach(label=>{
label.remove();
});

labels = [];

routeMeshes.forEach(route=>{
earthGroup.remove(route);
});

routeMeshes = [];

}

/* =========================
CREATE ROUTE
========================= */

function createRoute(start,end,color){

const mid =
start.clone()
.add(end)
.multiplyScalar(0.5);

mid.normalize()
.multiplyScalar(2.55);

const curve =
new THREE.QuadraticBezierCurve3(
start,
mid,
end
);

const geometry =
new THREE.TubeGeometry(
curve,
80,
0.012,
8,
false
);

const material =
new THREE.MeshBasicMaterial({
color:color,
transparent:true,
opacity:0.95
});

const tube =
new THREE.Mesh(
geometry,
material
);

earthGroup.add(tube);

routeMeshes.push(tube);

}

/* =========================
LOAD CHARACTER
========================= */

function loadCharacter(key){

clearScene();

const data =
characters[key];

subtitle.innerText =
data.name;

portrait.src =
data.portrait;

characterName.innerText =
data.name;

lifeDates.innerText =
data.life;

description.innerText =
data.description;

/* ===== TAGS ===== */

tagsContainer.innerHTML = '';

data.tags.forEach(tag=>{

const div =
document.createElement('div');

div.className = 'tag';

div.innerText = tag;

tagsContainer.appendChild(div);

});

/* ===== POSITIONS ===== */

const positions = [];

/* ===== CREATE NODES ===== */

data.locations.forEach(location=>{

const position =
latLonToVector3(
location.lat,
location.lon,
2.03
);

positions.push(position);

/* ===== NODE ===== */

const geometry =
new THREE.SphereGeometry(
0.05,
16,
16
);

const material =
new THREE.MeshBasicMaterial({
color:data.color
});

const node =
new THREE.Mesh(
geometry,
material
);

node.position.copy(position);

earthGroup.add(node);

nodes.push(node);

/* ===== LABEL ===== */

const label =
document.createElement('div');

label.className = 'label';

label.innerText =
location.name;

document.body.appendChild(label);

labels.push(label);

label.userData = {
node:node
};

});

/* ===== ROUTES ===== */

for(let i=0;i<positions.length-1;i++){

createRoute(
positions[i],
positions[i+1],
data.color
);

}

}

/* =========================
INITIAL LOAD
========================= */

loadCharacter('manjiro');

/* =========================
CHARACTER SWITCH
========================= */

document
.getElementById('characterSelect')
.addEventListener(
'change',
(event)=>{

loadCharacter(
event.target.value
);

}
);

/* =========================
LABEL UPDATE
========================= */

function updateLabels(){

labels.forEach(label=>{

const node =
label.userData.node;

const worldPosition =
node.getWorldPosition(
new THREE.Vector3()
);

const projected =
worldPosition.clone()
.project(camera);

const x =
(projected.x*0.5+0.5)
* window.innerWidth;

const y =
(-projected.y*0.5+0.5)
* window.innerHeight;

label.style.left =
`${x}px`;

label.style.top =
`${y}px`;

/* ===== HIDE BACKSIDE ===== */

const cameraDirection =
camera.position.clone()
.normalize();

const nodeDirection =
worldPosition.clone()
.normalize();

const dot =
cameraDirection.dot(
nodeDirection
);

if(dot < 0){

label.style.opacity = 0;

}else{

label.style.opacity = 1;

}

});

}

/* =========================
MOUSE CONTROL
========================= */

let isDragging = false;

let previousMousePosition = {
x:0,
y:0
};

renderer.domElement
.addEventListener(
'mousedown',
()=>{
isDragging = true;
}
);

renderer.domElement
.addEventListener(
'mouseup',
()=>{
isDragging = false;
}
);

renderer.domElement
.addEventListener(
'mousemove',
(event)=>{

if(isDragging){

const deltaMove = {
x:event.offsetX -
previousMousePosition.x
};

earthGroup.rotation.y +=
deltaMove.x * 0.005;

}

previousMousePosition = {
x:event.offsetX,
y:event.offsetY
};

}
);

/* =========================
ANIMATION
========================= */

function animate(){

requestAnimationFrame(
animate
);

earthGroup.rotation.y +=
0.0012;

stars.rotation.y +=
0.0001;

updateLabels();

renderer.render(
scene,
camera
);

}

animate();

/* =========================
RESIZE
========================= */

window.addEventListener(
'resize',
()=>{

camera.aspect =
window.innerWidth/
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

</script>

</body>
</html>
