<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GLOBAL HISTORY MAP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
color:white;
}

/* ===== CANVAS ===== */

canvas{
display:block;
}

/* ===== TITLE ===== */

.title{
position:absolute;
top:24px;
width:100%;
text-align:center;
z-index:10;
pointer-events:none;
}

.title h1{
font-size:72px;
letter-spacing:10px;
font-weight:700;
color:white;

text-shadow:
0 0 10px rgba(255,255,255,0.8),
0 0 30px rgba(255,255,255,0.6);
}

.title p{
margin-top:10px;
font-size:18px;
letter-spacing:12px;
color:#7ee7ff;
}

/* ===== LABELS ===== */

.label{
position:absolute;
font-size:14px;
letter-spacing:3px;
color:white;
pointer-events:none;
white-space:nowrap;

text-shadow:
0 0 10px rgba(255,255,255,0.9),
0 0 20px rgba(255,255,255,0.5);

transform:translate(-50%,-50%);
z-index:20;
}

/* ===== RIGHT PANEL ===== */

.panel{
position:absolute;
top:110px;
right:40px;

width:360px;
height:760px;

background:rgba(0,0,0,0.72);

border:1px solid rgba(0,200,255,0.2);

box-shadow:
0 0 30px rgba(0,150,255,0.15);

padding:22px;

backdrop-filter:blur(8px);

overflow-y:auto;

z-index:30;
}

/* ===== SELECT ===== */

select{
width:100%;
padding:14px;

background:black;
color:white;

border:1px solid rgba(255,255,255,0.2);

font-size:16px;
margin-bottom:20px;
}

/* ===== NAME ===== */

.character-name{
font-size:46px;
font-weight:700;
letter-spacing:4px;
line-height:1.0;
margin-bottom:8px;
}

.character-years{
font-size:18px;
letter-spacing:5px;
margin-bottom:20px;
}

/* ===== PORTRAIT ===== */

.portrait{
width:180px;
height:180px;

object-fit:cover;

border-radius:18px;

display:block;

margin:0 auto 24px auto;

border:1px solid rgba(255,255,255,0.2);

box-shadow:
0 0 25px rgba(255,255,255,0.15);
}

/* ===== DESCRIPTION ===== */

.description{
font-size:17px;
line-height:1.9;
color:#d8d8d8;

margin-bottom:28px;
}

/* ===== TAGS ===== */

.tags{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:35px;
}

.tag{
padding:8px 14px;

border:1px solid currentColor;

font-size:12px;
letter-spacing:2px;
}

/* ===== CONTEXT ===== */

.context-title{
font-size:16px;
letter-spacing:4px;
margin-bottom:16px;
opacity:0.8;
}

.event{
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.event-year{
font-size:13px;
letter-spacing:3px;
margin-bottom:6px;
opacity:0.7;
}

.event-text{
font-size:15px;
line-height:1.6;
color:#d8d8d8;
}

/* ===== TIMELINE ===== */

.timeline{
position:absolute;

bottom:42px;
left:50%;

transform:translateX(-50%);

display:flex;
align-items:center;
gap:14px;

z-index:50;
}

.year{
font-size:13px;
letter-spacing:5px;
opacity:0.85;
}

.line{
width:95px;
height:2px;
background:rgba(255,255,255,0.18);
position:relative;
overflow:hidden;
}

.active-line{
position:absolute;
left:0;
top:0;

height:100%;
width:0%;
}

/* ===== RESPONSIVE ===== */

@media(max-width:1200px){

.panel{
width:320px;
height:680px;
}

.title h1{
font-size:50px;
}

}

</style>
</head>

<body>

<!-- ===== TITLE ===== -->

<div class="title">
<h1>GLOBAL HISTORY MAP</h1>
<p id="subtitle">JOHN MANJIRO</p>
</div>

<!-- ===== LABEL CONTAINER ===== -->

<div id="labels"></div>

<!-- ===== RIGHT PANEL ===== -->

<div class="panel">

<select id="characterSelect">
<option value="john">JOHN MANJIRO</option>
<option value="tesla">NIKOLA TESLA</option>
</select>

<div class="character-name" id="characterName"></div>

<div class="character-years" id="characterYears"></div>

<img class="portrait" id="portrait" />

<div class="description" id="description"></div>

<div class="tags" id="tags"></div>

<div class="context-title">
WORLD CONTEXT
</div>

<div id="events"></div>

</div>

<!-- ===== TIMELINE ===== -->

<div class="timeline">

<div class="year">1800</div>

<div class="line">
<div class="active-line" id="line1"></div>
</div>

<div class="year">1850</div>

<div class="line">
<div class="active-line" id="line2"></div>
</div>

<div class="year">1900</div>

<div class="line">
<div class="active-line" id="line3"></div>
</div>

<div class="year">1950</div>

</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

/* =========================================================
DATA
========================================================= */

const CHARACTERS = {

john:{

name:"JOHN MANJIRO",

subtitle:"JOHN MANJIRO",

years:"1827 — 1898",

portrait:"john-manjiro-portrait.png",

theme:"#2eefff",

description:
"Nakahama Manjiro connected Japan and America during the dawn of globalization. After surviving a shipwreck, he crossed the Pacific Ocean, studied Western navigation and science, and later returned to Japan during the final years of the Edo period. His life symbolizes the opening of Japan to the modern world.",

tags:[
"PACIFIC",
"NAVIGATION",
"GLOBALIZATION",
"MODERNIZATION"
],

events:[
{
year:"1839",
text:"The First Opium War begins between Britain and Qing China."
},
{
year:"1848",
text:"California Gold Rush accelerates Pacific migration and trade."
},
{
year:"1853",
text:"Commodore Perry arrives in Japan with the Black Ships."
},
{
year:"1868",
text:"The Meiji Restoration transforms Japan into a modern nation."
}
],

cities:[
{
name:"TOSASHIMIZU",
lat:32.7813,
lon:132.9553
},
{
name:"TORISHIMA",
lat:30.4847,
lon:140.3033
},
{
name:"HAWAII",
lat:21.3069,
lon:-157.8583
},
{
name:"SAN FRANCISCO",
lat:37.7749,
lon:-122.4194
}
]

},

tesla:{

name:"NIKOLA TESLA",

subtitle:"NIKOLA TESLA",

years:"1856 — 1943",

portrait:"nikola-tesla-portrait.png",

theme:"#9c7dff",

description:
"Nikola Tesla transformed the modern technological world through alternating current systems, wireless energy concepts, and electromagnetic innovation. His work shaped the electric age and influenced global communication and industry.",

tags:[
"ELECTRICITY",
"SCIENCE",
"INDUSTRY",
"MODERNITY"
],

events:[
{
year:"1879",
text:"Thomas Edison expands electric lighting systems."
},
{
year:"1893",
text:"The Chicago World's Fair showcases AC electricity."
},
{
year:"1901",
text:"Marconi transmits the first transatlantic radio signal."
},
{
year:"1914",
text:"World War I reshapes industrial civilization."
}
],

cities:[
{
name:"SMILJAN",
lat:44.5669,
lon:15.3175
},
{
name:"BUDAPEST",
lat:47.4979,
lon:19.0402
},
{
name:"PARIS",
lat:48.8566,
lon:2.3522
},
{
name:"NEW YORK",
lat:40.7128,
lon:-74.0060
}
]

}

};

/* =========================================================
THREE.JS
========================================================= */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
55,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 5.5;

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);

/* =========================================================
STARS
========================================================= */

const starsGeometry = new THREE.BufferGeometry();

const starVertices = [];

for(let i=0;i<14000;i++){

const x = (Math.random()-0.5)*2000;
const y = (Math.random()-0.5)*2000;
const z = (Math.random()-0.5)*2000;

starVertices.push(x,y,z);

}

starsGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
);

const starsMaterial = new THREE.PointsMaterial({
color:0xffffff,
size:0.7
});

const stars = new THREE.Points(
starsGeometry,
starsMaterial
);

scene.add(stars);

/* =========================================================
EARTH
========================================================= */

const textureLoader = new THREE.TextureLoader();

const earthTexture =
textureLoader.load('earth.jpg');

const earthGeometry =
new THREE.SphereGeometry(2,64,64);

const earthMaterial =
new THREE.MeshStandardMaterial({
map:earthTexture
});

const earth =
new THREE.Mesh(
earthGeometry,
earthMaterial
);

scene.add(earth);

/* ===== GLOW ===== */

const glowGeometry =
new THREE.SphereGeometry(2.08,64,64);

const glowMaterial =
new THREE.MeshBasicMaterial({
color:0x2eefff,
transparent:true,
opacity:0.12
});

const glow =
new THREE.Mesh(
glowGeometry,
glowMaterial
);

scene.add(glow);

/* =========================================================
LIGHT
========================================================= */

const light =
new THREE.PointLight(
0xffffff,
8
);

light.position.set(5,3,5);

scene.add(light);

const ambient =
new THREE.AmbientLight(
0xffffff,
2
);

scene.add(ambient);

/* =========================================================
GROUPS
========================================================= */

const nodeGroup = new THREE.Group();
const lineGroup = new THREE.Group();

earth.add(nodeGroup);
earth.add(lineGroup);

const labelContainer =
document.getElementById("labels");

let labels = [];

/* =========================================================
UTILS
========================================================= */

function latLonToVector3(lat,lon,radius=2){

const phi =
(90-lat)*(Math.PI/180);

const theta =
(lon+180)*(Math.PI/180);

return new THREE.Vector3(
-(radius*Math.sin(phi)*Math.cos(theta)),
radius*Math.cos(phi),
radius*Math.sin(phi)*Math.sin(theta)
);

}

/* =========================================================
CREATE CHARACTER
========================================================= */

function loadCharacter(id){

/* ===== CLEAR ===== */

while(nodeGroup.children.length){
nodeGroup.remove(nodeGroup.children[0]);
}

while(lineGroup.children.length){
lineGroup.remove(lineGroup.children[0]);
}

labels.forEach(l=>l.remove());

labels=[];

const data = CHARACTERS[id];

/* =========================================================
UI
========================================================= */

document.getElementById("subtitle")
.innerText = data.subtitle;

document.getElementById("characterName")
.innerText = data.name;

document.getElementById("characterYears")
.innerText = data.years;

document.getElementById("portrait")
.src = data.portrait;

document.getElementById("description")
.innerText = data.description;

/* ===== TAGS ===== */

const tagsEl =
document.getElementById("tags");

tagsEl.innerHTML = "";

data.tags.forEach(tag=>{

const div =
document.createElement("div");

div.className="tag";

div.innerText=tag;

div.style.color=data.theme;

tagsEl.appendChild(div);

});

/* ===== EVENTS ===== */

const eventsEl =
document.getElementById("events");

eventsEl.innerHTML="";

data.events.forEach(event=>{

const div =
document.createElement("div");

div.className="event";

div.innerHTML = `
<div class="event-year">
${event.year}
</div>

<div class="event-text">
${event.text}
</div>
`;

eventsEl.appendChild(div);

});

/* ===== TIMELINE ===== */

document.querySelectorAll(".active-line")
.forEach(line=>{

line.style.background=data.theme;
line.style.width="100%";

});

/* ===== GLOW ===== */

glow.material.color =
new THREE.Color(data.theme);

/* =========================================================
NODES
========================================================= */

const points = [];

data.cities.forEach((city,index)=>{

const pos =
latLonToVector3(
city.lat,
city.lon,
2.02
);

points.push(pos);

/* ===== NODE ===== */

const node =
new THREE.Mesh(

new THREE.SphereGeometry(
0.05,
16,
16
),

new THREE.MeshBasicMaterial({
color:data.theme
})

);

node.position.copy(pos);

nodeGroup.add(node);

/* ===== LABEL ===== */

const label =
document.createElement("div");

label.className="label";

label.innerText=city.name;

document.body.appendChild(label);

labels.push(label);

label.userData = {
position:pos,
offsetX:index*6,
offsetY:index*2
};

});

/* =========================================================
LINES
========================================================= */

for(let i=0;i<points.length-1;i++){

const start = points[i];
const end = points[i+1];

const mid =
start.clone()
.add(end)
.multiplyScalar(0.5);

mid.normalize()
.multiplyScalar(2.18);

const curve =
new THREE.QuadraticBezierCurve3(
start,
mid,
end
);

const curvePoints =
curve.getPoints(120);

const geometry =
new THREE.BufferGeometry()
.setFromPoints(curvePoints);

const material =
new THREE.LineBasicMaterial({
color:data.theme,
transparent:true,
opacity:0.95
});

const line =
new THREE.Line(
geometry,
material
);

lineGroup.add(line);

}

}

/* =========================================================
LABEL UPDATE
========================================================= */

function updateLabels(){

labels.forEach(label=>{

const pos =
label.userData.position.clone();

pos.applyMatrix4(
earth.matrixWorld
);

const projected =
pos.project(camera);

const x =
(projected.x*0.5+0.5)
*window.innerWidth;

const y =
(-projected.y*0.5+0.5)
*window.innerHeight;

label.style.left =
`${x + label.userData.offsetX}px`;

label.style.top =
`${y + label.userData.offsetY}px`;

/* ===== HIDE BACKSIDE ===== */

const cameraDirection =
camera.position.clone().normalize();

const dot =
pos.clone()
.normalize()
.dot(cameraDirection);

if(dot < 0){

label.style.display="none";

}else{

label.style.display="block";

}

});

}

/* =========================================================
SELECT
========================================================= */

const select =
document.getElementById("characterSelect");

select.addEventListener("change",(e)=>{

loadCharacter(e.target.value);

});

/* =========================================================
START
========================================================= */

loadCharacter("john");

/* =========================================================
ANIMATION
========================================================= */

function animate(){

requestAnimationFrame(animate);

earth.rotation.y += 0.0015;

glow.rotation.y += 0.0015;

updateLabels();

renderer.render(scene,camera);

}

animate();

/* =========================================================
RESIZE
========================================================= */

window.addEventListener('resize',()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
