<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GLOBAL HISTORY MAP</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
}

canvas{
display:block;
}

.title{
position:absolute;
top:40px;
width:100%;
text-align:center;
color:white;
z-index:10;
pointer-events:none;
}

.title h1{
margin:0;
font-size:42px;
letter-spacing:6px;
text-shadow:0 0 20px rgba(255,255,255,0.8);
}

.title p{
margin-top:10px;
font-size:12px;
letter-spacing:10px;
color:#aaa;
}
.timeline{

position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);

display:flex;
align-items:center;
gap:12px;

color:white;

z-index:10;

font-size:12px;
letter-spacing:3px;

}

.line{

width:80px;
height:1px;

background:rgba(255,255,255,0.4);

}

.year{

opacity:0.8;

}
</style>
</head>

<body>

<div class="title">
<h1>GLOBAL HISTORY MAP</h1>
<p>HUMANITY THROUGH TIME</p>
</div>
<div class="timeline">

<div class="year">3000 BC</div>
<div class="line"></div>
<div class="year">0</div>
<div class="line"></div>
<div class="year">1000</div>
<div class="line"></div>
<div class="year">1500</div>
<div class="line"></div>
<div class="year">2025</div>

</div>
<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';



// シーン

const scene = new THREE.Scene();



// カメラ

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth / window.innerHeight,
0.1,
1000
);

camera.position.z = 5;



// レンダラー

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.setPixelRatio(
window.devicePixelRatio
);

document.body.appendChild(
renderer.domElement
);



// 星空

const starsGeometry = new THREE.BufferGeometry();

const starVertices = [];

for(let i=0;i<12000;i++){

const x = (Math.random()-0.5)*2000;
const y = (Math.random()-0.5)*2000;
const z = (Math.random()-0.5)*2000;

starVertices.push(x,y,z);

}

starsGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(
starVertices,
3
)
);

const starsMaterial = new THREE.PointsMaterial({
color:0xffffff,
size:0.7
});

const stars = new THREE.Points(
starsGeometry,
starsMaterial
);

scene.add(stars);



// 地球テクスチャ

const textureLoader = new THREE.TextureLoader();

const earthTexture = textureLoader.load(
'earth.jpg'
);



// 地球

const earthGeometry = new THREE.SphereGeometry(
2,
64,
64
);

const earthMaterial = new THREE.MeshStandardMaterial({
map:earthTexture,
metalness:0.1,
roughness:0.8
});

const earth = new THREE.Mesh(
earthGeometry,
earthMaterial
);

scene.add(earth);



// 発光

const glowGeometry = new THREE.SphereGeometry(
2.15,
64,
64
);

const glowMaterial = new THREE.MeshBasicMaterial({
color:0x3399ff,
transparent:true,
opacity:0.18
});

const glow = new THREE.Mesh(
glowGeometry,
glowMaterial
);

scene.add(glow);
function createNode(lat,lon,color){

const nodeGeometry =
new THREE.SphereGeometry(0.04,16,16);

const nodeMaterial =
new THREE.MeshBasicMaterial({
color:color
});

const node =
new THREE.Mesh(
nodeGeometry,
nodeMaterial
);

const phi =
(90-lat)*(Math.PI/180);

const theta =
(lon+180)*(Math.PI/180);

const radius = 2.02;

node.position.x =
-(radius*Math.sin(phi)*Math.cos(theta));

node.position.y =
radius*Math.cos(phi);

node.position.z =
radius*Math.sin(phi)*Math.sin(theta);

scene.add(node);

}

createNode(35.6762,139.6503,0x00ffff);
createNode(41.9028,12.4964,0xffaa00);
createNode(30.0444,31.2357,0xff0000);
createNode(39.9042,116.4074,0x00ff66);


// 光

const light = new THREE.PointLight(
0xffffff,
8
);

light.position.set(5,3,5);

scene.add(light);

const ambientLight = new THREE.AmbientLight(
0xffffff,
2
);

scene.add(ambientLight);



// 回転アニメーション

function animate(){

requestAnimationFrame(animate);

earth.rotation.y += 0.0018;

glow.rotation.y += 0.0018;

renderer.render(
scene,
camera
);

}

animate();



// リサイズ対応

window.addEventListener('resize',()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
