<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GLOBAL HISTORY MAP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

/* 星空 */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 30%, white 1px, transparent 2px),
        radial-gradient(circle at 70% 20%, white 1px, transparent 2px),
        radial-gradient(circle at 40% 80%, white 1px, transparent 2px),
        radial-gradient(circle at 90% 70%, white 1px, transparent 2px),
        radial-gradient(circle at 10% 60%, white 1px, transparent 2px);
    background-size:300px 300px;
    opacity:0.5;
    z-index:-2;
}

/* タイトル */

#title{
    position:absolute;
    top:18px;
    width:100%;
    text-align:center;
    font-size:82px;
    letter-spacing:8px;
    font-weight:700;
    color:white;
    text-shadow:
        0 0 10px white,
        0 0 25px white,
        0 0 50px white;
    z-index:20;
    pointer-events:none;
}

/* 地球 */

#globeViz{
    position:absolute;
    inset:0;
    z-index:1;
}

/* 左イベント */

#eventsPanel{
    position:absolute;
    top:100px;
    left:28px;
    width:370px;
    height:600px;

    background:rgba(0,0,0,0.55);
    border:1px solid rgba(255,255,255,0.08);

    padding:24px;

    backdrop-filter:blur(10px);

    z-index:15;
}

.panelTitle{
    font-size:15px;
    letter-spacing:5px;
    margin-bottom:28px;
    color:white;
}

.event{
    margin-bottom:32px;
    padding-left:16px;
    border-left:3px solid #00e5ff;
}

.eventYear{
    color:#7fe8ff;
    font-size:13px;
    letter-spacing:3px;
    margin-bottom:10px;
}

.eventText{
    color:white;
    line-height:1.7;
    font-size:16px;
}

/* 右人物 */

#infoPanel{
    position:absolute;
    top:88px;
    right:28px;

    width:380px;
    height:760px;

    background:rgba(0,0,0,0.55);
    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    padding:20px;

    z-index:15;
}

/* セレクト */

#personSelect{
    width:100%;
    height:58px;

    background:black;
    color:white;

    border:1px solid rgba(255,255,255,0.25);

    font-size:16px;
    padding-left:18px;

    margin-bottom:28px;
}

/* 肖像 */

#portrait{
    width:170px;
    height:170px;

    object-fit:cover;

    border-radius:22px;

    display:block;
    margin:auto;

    box-shadow:
        0 0 20px rgba(255,255,255,0.15);
}

/* 名前 */

#personName{
    margin-top:34px;

    font-size:64px;
    font-weight:700;
    line-height:0.92;

    color:white;
}

/* 年代 */

#personYears{
    margin-top:18px;

    color:#6ddfff;
    letter-spacing:8px;
    font-size:16px;
}

/* 説明 */

#personDescription{
    margin-top:34px;

    line-height:1.95;
    color:#e0e0e0;

    font-size:17px;
}

/* 年代バー */

#timeline{
    position:absolute;

    bottom:42px;
    left:230px;
    right:230px;

    height:90px;

    z-index:15;
}

#timelineLine{
    position:absolute;
    top:42px;

    width:100%;
    height:2px;

    background:rgba(255,255,255,0.18);
}

/* 年代 */

.yearMark{
    position:absolute;
    top:0;

    transform:translateX(-50%);

    color:white;

    opacity:0.8;

    font-size:14px;
    letter-spacing:3px;
}

/* 生涯バー */

#lifeBar{
    position:absolute;
    top:40px;

    height:4px;

    background:#00e5ff;

    box-shadow:
        0 0 10px #00e5ff,
        0 0 20px #00e5ff;

    border-radius:999px;
}

</style>
</head>

<body>

<div id="title">GLOBAL HISTORY MAP</div>

<div id="globeViz"></div>

<!-- 左イベント -->

<div id="eventsPanel">

    <div class="panelTitle">
        WORLD EVENTS
    </div>

    <div id="eventsContainer"></div>

</div>

<!-- 右人物 -->

<div id="infoPanel">

    <select id="personSelect"></select>

    <img id="portrait" />

    <div id="personName"></div>

    <div id="personYears"></div>

    <div id="personDescription"></div>

</div>

<!-- 年代バー -->

<div id="timeline">

    <div id="timelineLine"></div>

    <div class="yearMark" style="left:0%">1600</div>
    <div class="yearMark" style="left:20%">1700</div>
    <div class="yearMark" style="left:40%">1800</div>
    <div class="yearMark" style="left:60%">1900</div>
    <div class="yearMark" style="left:80%">2000</div>

    <div id="lifeBar"></div>

</div>

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script>

const people = {

    manjiro: {

        name: "JOHN<br>MANJIRO",

        shortName: "JOHN MANJIRO",

        years: "1827 — 1898",

        birth: 1827,
        death: 1898,

        image: "john-manjiro-portrait.png",

        description:
            "Nakahama Manjiro connected Japan and America during the dawn of globalization.",

        color: "#00e5ff",

        events: [

            {
                year:"1839",
                text:"The First Opium War begins."
            },

            {
                year:"1848",
                text:"California Gold Rush accelerates migration."
            },

            {
                year:"1853",
                text:"Commodore Perry arrives in Japan."
            },

            {
                year:"1868",
                text:"Meiji Restoration transforms Japan."
            }

        ],

        locations: [

            {
                lat:32.7805,
                lng:132.9553,
                name:"TOSASHIMIZU"
            },

            {
                lat:21.3069,
                lng:-157.8583,
                name:"HAWAII"
            },

            {
                lat:37.7749,
                lng:-122.4194,
                name:"SAN FRANCISCO"
            }

        ]
    }

};

const world = Globe()

(document.getElementById('globeViz'))

.globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')

.bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')

.backgroundColor('rgba(0,0,0,0)')

.atmosphereColor('#00d9ff')

.atmosphereAltitude(0.15);

world.controls().autoRotate = true;
world.controls().autoRotateSpeed = 0.4;

world.pointOfView({
    lat:20,
    lng:-150,
    altitude:2.2
});

const select = document.getElementById("personSelect");

Object.keys(people).forEach(key=>{

    const option = document.createElement("option");

    option.value = key;
    option.textContent = people[key].shortName;

    select.appendChild(option);

});

function setPerson(key){

    const person = people[key];

    document.getElementById("portrait").src = person.image;

    document.getElementById("personName").innerHTML = person.name;

    document.getElementById("personYears").innerHTML = person.years;

    document.getElementById("personDescription").innerHTML =
        person.description;

    /* 左イベント */

    const eventsContainer =
        document.getElementById("eventsContainer");

    eventsContainer.innerHTML = "";

    person.events.forEach(ev=>{

        const div = document.createElement("div");

        div.className = "event";

        div.style.borderLeftColor = person.color;

        div.innerHTML = `
            <div class="eventYear">${ev.year}</div>
            <div class="eventText">${ev.text}</div>
        `;

        eventsContainer.appendChild(div);

    });

    /* 地点 */

    world.pointsData(
        person.locations.map(loc=>({

            lat:loc.lat,
            lng:loc.lng,
            size:0.55,
            color:person.color,
            label:loc.name

        }))
    )

    .pointAltitude(0.02)

    .pointColor("color")

    .pointRadius("size")

    .labelsData(
        person.locations.map(loc=>({

            lat:loc.lat,
            lng:loc.lng,
            text:loc.name,
            color:"white",
            size:1.2

        }))
    )

    .labelText("text")

    .labelSize("size")

    .labelColor("color")

    .labelDotRadius(0);

    /* 線 */

    const arcs = [];

    for(let i=0;i<person.locations.length-1;i++){

        arcs.push({

            startLat:person.locations[i].lat,
            startLng:person.locations[i].lng,

            endLat:person.locations[i+1].lat,
            endLng:person.locations[i+1].lng,

            color:[person.color, person.color]

        });

    }

    world.arcsData(arcs)

        .arcColor("color")

        .arcAltitude(0.25)

        .arcStroke(0.7)

        .arcDashLength(0.5)

        .arcDashGap(1)

        .arcDashAnimateTime(3500);

    /* 年代バー */

    const start = 1600;
    const end = 2020;

    const left =
        ((person.birth-start)/(end-start))*100;

    const width =
        ((person.death-person.birth)/(end-start))*100;

    const lifeBar =
        document.getElementById("lifeBar");

    lifeBar.style.left = left + "%";

    lifeBar.style.width = width + "%";

    lifeBar.style.background = person.color;

    lifeBar.style.boxShadow =
        `0 0 12px ${person.color},
         0 0 22px ${person.color}`;

}

select.addEventListener("change",(e)=>{

    setPerson(e.target.value);

});

setPerson("manjiro");

</script>

</body>
</html>
